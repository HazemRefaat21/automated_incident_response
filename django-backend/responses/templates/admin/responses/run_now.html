{% extends "admin/base_site.html" %}
{% block content %}
<p>Run the following response(s) manually:</p>
<ul>
  {% for d in definitions %}<li><strong>{{ d.name }}</strong> ({{ d.handler_key }})</li>{% endfor %}
</ul>

<form action="" method="post">{% csrf_token %}
  {{ form.as_p }}

  {% for d in queryset %}
  <input type="hidden" name="{{ action_checkbox_name }}" value="{{ d.pk }}">
  {% endfor %}
  <input type="hidden" name="action" value="run_now">

  <input type="submit" name="apply" value="Run now" class="default">
  <a href="#" onclick="window.history.back(); return false;" class="button cancel-link">Cancel</a>
</form>
{% endblock %}
