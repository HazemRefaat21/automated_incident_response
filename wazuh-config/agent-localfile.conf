<!--
  Wazuh AGENT config — make Wazuh read Django's access log.

  Add this <localfile> block inside the <ossec_config> root of the agent's
  ossec.conf (default: /var/ossec/etc/ossec.conf on the host running Django),
  then restart the agent:

      sudo /var/ossec/bin/wazuh-control restart
      # or: sudo systemctl restart wazuh-agent

  The Wazuh manager's built-in web ruleset (web_rules / *_decoders) parses these
  Apache-format lines and raises alerts for SQLi, XSS, directory traversal, etc.
  Those alerts then reach this SIEM via the custom-django integration.

  The agent's user (wazuh) must be able to read the file:
      chmod o+r /home/hazem/automated_incident_response/django-backend/logs/django_access.log
-->
<localfile>
  <log_format>apache</log_format>
  <location>/home/hazem/automated_incident_response/django-backend/logs/django_access.log</location>
</localfile>
